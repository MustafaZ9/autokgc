name: Kingshot Scraper & Redeemer

on:
  schedule:
    # Runs every 12 hours (hour 0, 3, 6, 9, 12, 15, 18, 21)
    - cron: '0 */4 * * *'
  # Allows you to trigger the run manually from the GitHub Actions tab
  workflow_dispatch:
  # Allows triggering from another repository via API
  repository_dispatch:
    types: [trigger-scraper]
jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        # We need the full history to persist known_codes.txt back
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Verify curl_cffi
      run: |
        python -c "from curl_cffi import requests; print('✅ curl_cffi imported successfully')"

    - name: Run Kingshot Scraper & Redeemer
      run: |
        # Run the auto script using the user's config.json / default CSV
        python kingshot.py

    - name: Commit and Push state updates
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "chore: update known and redeemed codes state"
        file_pattern: "known_codes.txt redeemed_codes.txt config.json lod.csv"

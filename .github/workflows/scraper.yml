name: GiftCode Scraper

on:
  # This makes it run automatically every 6 hours
  schedule:
    - cron: '0 */6 * * *'
  
  # This allows you to trigger it manually from the GitHub Actions tab
  workflow_dispatch:

  # This allows triggering from another repository via API
  repository_dispatch:
    types: [trigger-scraper]

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    
    # We need permission to commit back to the repo
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scraper
        run: |
          python kingshot.py

      - name: Commit and push changes
        run: |
          # Set up Git config
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          # Add the tracking files
          git add known_codes.txt redeemed_codes.txt lod.csv
          
          # Commit and push if there are changes
          if git diff --staged --quiet; then
            echo "No new codes found. Nothing to commit."
          else
            git commit -m "Auto-update: Found new gift codes"
            git push
            echo "Changes successfully pushed to repository."
          fi
